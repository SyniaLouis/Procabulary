<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bộ từ cá nhân - Procab Engine</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="container" id="main-container">
    <div class="header-bar">
        <div class="icon-btn" onclick="handleHomeClick()" title="Trang chủ">🏠</div>
        
        <h2>Bộ từ cá nhân</h2>

        <div class="header-btns">
            <div id="user-info" style="display: flex; align-items: center; gap: 8px; margin-right: 5px;">
                <img id="user-avatar" src="" alt="" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary); display: none;">
                <span id="user-name" style="display: none;"></span>
            </div>
            
            <div class="icon-btn" id="speed-btn" onclick="toggleSpeed()" title="Tốc độ đọc">1.0x</div>
            <div class="icon-btn" id="voice-btn" onclick="toggleVoice()" title="Giọng đọc">US</div>
            <div class="icon-btn" id="theme-btn" onclick="toggleDarkMode()" title="Chế độ tối">🌙</div>
        </div>
    </div>

    <div id="view-dashboard">
        <div id="dashboard-grid" class="dashboard-grid"></div>
    </div>

    <div id="view-lesson" class="hidden">
        <div id="lesson-content"></div>
    </div>
</div>

<div id="modal-selection" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h3>Chọn số lượng từ ôn tập 🎯</h3>
        <ul>
            <li class="word-count-option" onclick="startLesson(5)">Học nhanh: 5 từ</li>
            <li class="word-count-option" onclick="startLesson(10)">Tiêu chuẩn: 10 từ</li>
            <li class="word-count-option" onclick="startLesson(20)">Chuyên sâu: 20 từ</li>
            <li class="word-count-option" onclick="startLesson(50)">Thử thách: 50 từ</li>
        </ul>
        <button class="cancel-btn" onclick="closeSelectionModal()">HỦY BỎ</button>
    </div>
</div>

<div id="modal-create-lesson" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 500px;">
        <h3>Tạo bộ từ của riêng bạn</h3>
        <div class="custom-form" style="text-align: left;">
            <label style="color: white; display: block; margin-bottom: 5px; font-weight: 600;">Tên bộ từ:</label>
            <input type="text" id="custom-title" placeholder="Ví dụ: My Vocabulary..." style="width: 100%; margin-bottom: 15px;">
            
            <label style="color: white; display: block; margin-bottom: 5px; font-weight: 600;">Dữ liệu (Word, IPA, Meaning):</label>
            <textarea id="custom-data" placeholder="Apple, /ˈæp.əl/, Quả táo,..." style="width: 100%; height: 120px; resize: none; margin-bottom: 20px;"></textarea>
            
            <button class="btn-primary" onclick="window.saveNewLesson()" style="width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Inter';">TẠO NGAY</button>
            <button class="cancel-btn" onclick="window.closeCreateModal()" style="width: 100%; margin-top: 10px;">HỦY BỎ</button>
        </div>
    </div>
</div>

<div id="confirm-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h3>Xác nhận thoát 🚪</h3>
        <p style="margin-top: 10px; color: var(--text-muted);">Tiến độ phiên học này sẽ không được lưu nếu em thoát ngay bây giờ.</p>
        <div style="display:flex; gap:10px; margin-top:25px">
            <button style="background:var(--primary); flex:1; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold;" onclick="closeConfirmModal()">LÀM TIẾP</button>
            <button style="background:var(--error); flex:1; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold;" id="exit-btn">THOÁT</button>
        </div>
    </div>
</div>

<script>
    window.CATEGORY_FILTER = 'PERSONAL';
</script>

<script type="module" src="../assets/js/script.js"></script>
<script type="module" src="../assets/js/func.js"></script>

</body>
</html>
