<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procab Engine - Cổng học tập</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .home-header { text-align: center; padding: 30px 20px 10px; }
        .home-header h1 { color: var(--primary); font-size: 2.2rem; margin-bottom: 10px; }
        .home-header p { color: #636e72; font-size: 1.1rem; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .cat-card {
            background: var(--card-bg); border: 2px solid var(--border); border-radius: 15px;
            padding: 30px 20px; text-align: center; text-decoration: none; color: var(--text);
            transition: 0.3s; display: block; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .cat-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .cat-icon { font-size: 3rem; margin-bottom: 15px; }
        .cat-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 8px; }
        .cat-desc { font-size: 0.9rem; color: #636e72; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="home-header">
            <h1>Procab Engine V2.2</h1>
            <p>Hôm nay em muốn luyện tập môn gì? 🎯</p>
        </div>
        <div class="category-grid">
            <a href="IELTS/index.html" class="cat-card">
                <div class="cat-icon">🇬🇧</div>
                <div class="cat-title">Từ vựng IELTS</div>
                <div class="cat-desc">Học từ vựng nền tảng và nâng cao</div>
            </a>
        </div>
    </div>
</body>
</html>
